name: Deploy to Power Platform

on:
  push:
    branches: [release/dev, release/prod]

jobs:
  deploy:
    runs-on: windows-latest
    environment: ${{ github.ref == 'refs/heads/release/prod' && 'Production' || 'Development' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Power Platform CLI
        run: dotnet tool install --global Microsoft.PowerApps.CLI.Tool

      - name: Authenticate to Power Platform
        run: pac auth create --tenant "${{ secrets.PAC_TENANT_ID }}" --applicationId "${{ secrets.PAC_CLIENT_ID }}" --clientSecret "${{ secrets.PAC_CLIENT_SECRET }}" --environment "${{ secrets.PAC_ENV_URL }}"

      - name: Push Code App
        run: pac code push
